<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recarregue">
<meta name="theme-color" content="#0e0a1f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Recarregue ⚡</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  /* Cores fixas */
  --green:     #10B981;
  --green-bg:  rgba(16,185,129,.15);
  --amber:     #F59E0B;
  --amber-bg:  rgba(245,158,11,.15);
  --red:       #F87171;
  --red-bg:    rgba(248,113,113,.15);
  --r:         16px;
  --sh:        0 4px 24px rgba(0,0,0,.5);
}

/* ── PALETAS ──────────────────────────────────────────── */
/* ROXO (padrão) */
body[data-palette="roxo"] {
  --accent:    #8B5CF6;
  --accent-lt: #A78BFA;
  --accent-dk: #7C3AED;
  --accent-bg: rgba(139,92,246,.15);
  --border-c:  rgba(139,92,246,.2);
  --bg-d:    #0e0a1f; --card-d:  #1c1535; --card2-d: #251d42;
  --bg-l:    #f5f3ff; --card-l:  #ffffff; --card2-l: #ede9fe;
}
/* PRETO */
body[data-palette="preto"] {
  --accent:    #A3A3A3;
  --accent-lt: #D4D4D4;
  --accent-dk: #737373;
  --accent-bg: rgba(163,163,163,.12);
  --border-c:  rgba(163,163,163,.18);
  --bg-d:    #0a0a0a; --card-d:  #141414; --card2-d: #1f1f1f;
  --bg-l:    #f5f5f5; --card-l:  #ffffff; --card2-l: #e5e5e5;
}
/* AZUL */
body[data-palette="azul"] {
  --accent:    #3B82F6;
  --accent-lt: #60A5FA;
  --accent-dk: #2563EB;
  --accent-bg: rgba(59,130,246,.15);
  --border-c:  rgba(59,130,246,.2);
  --bg-d:    #09111e; --card-d:  #0f1d30; --card2-d: #162740;
  --bg-l:    #eff6ff; --card-l:  #ffffff; --card2-l: #dbeafe;
}

/* ── TEMAS ────────────────────────────────────────────── */
body[data-theme="dark"] {
  --bg: var(--bg-d); --card: var(--card-d); --card2: var(--card2-d);
  --text: #F0EDF8; --text2: #C4B8E8; --muted: #7C6FA0;
}
body[data-theme="light"] {
  --bg: var(--bg-l); --card: var(--card-l); --card2: var(--card2-l);
  --text: #1a1030; --text2: #3d2c6b; --muted: #6b5fa0;
}

/* Aliases para compatibilidade com código existente */
body {
  --purple:    var(--accent);
  --purple-lt: var(--accent-lt);
  --purple-dk: var(--accent-dk);
  --purple-bg: var(--accent-bg);
  --border:    var(--border-c);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100dvh; max-width: 430px; margin: 0 auto;
}

#app { min-height: 100dvh; display: flex; flex-direction: column; }

/* HEADER */
.hdr {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px;
  padding-top: calc(16px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
}
.hdr-title { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
.hdr-icon { font-size: 22px; }

/* MAIN */
.main {
  flex: 1; padding: 16px;
  padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px));
  overflow-y: auto;
}

/* BOTTOM NAV */
.bnav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; align-items: stretch;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 8px 0 10px; border: none; background: none; cursor: pointer;
  color: var(--muted); font-size: 10px; gap: 4px; font-family: inherit; transition: color .15s;
  opacity: .55;
}
.nav-btn.on {
  color: var(--accent-lt);
  font-weight: 700;
  opacity: 1;
}
.nav-btn.on .nav-ico {
  background: rgba(139,92,246,.28);
  border-radius: 12px;
  padding: 5px 13px;
  box-shadow: 0 0 14px rgba(139,92,246,.35);
  transform: scale(1.08);
}
.nav-btn.sos-btn { color: #F87171; opacity: .75; }
.nav-btn.sos-btn.on { color: #FF6B6B; opacity: 1; }
.nav-btn.sos-btn.on .nav-ico {
  background: rgba(248,113,113,.22);
  box-shadow: 0 0 14px rgba(248,113,113,.3);
}
.nav-ico { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; }
.nav-ico svg { display: block; }

/* CARD */
.card {
  background: var(--card); border-radius: var(--r);
  padding: 16px; margin-bottom: 14px;
  border: 1px solid var(--border); box-shadow: var(--sh);
}
.card2 { background: var(--card2); }
.sec {
  font-size: 11px; font-weight: 700; letter-spacing: .7px;
  text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}

/* ENERGY DISPLAY */
.nrg { text-align: center; padding: 8px 0 12px; }
.nrg-date { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.nrg-row { display: flex; align-items: flex-end; justify-content: center; gap: 6px; margin-bottom: 4px; }
.nrg-val { font-size: 72px; font-weight: 800; line-height: 1; transition: color .4s; }
.nrg-val.pulse { animation: pulse 1.8s ease-in-out infinite; }
.nrg-spoon { font-size: 32px; margin-bottom: 8px; }
.nrg-total { font-size: 22px; font-weight: 300; color: var(--muted); margin-bottom: 10px; }
.nrg-label { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

.nrg-bar { background: rgba(255,255,255,.08); border-radius: 99px; height: 10px; overflow: hidden; }
.nrg-fill { height: 100%; border-radius: 99px; transition: width .4s ease, background .4s; }

/* SPOON BAR */
.spoon-bar { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }
.spoon { height: 10px; border-radius: 99px; flex-shrink: 0; transition: background .4s; }

/* PROGRESS PCT */
.nrg-pct { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ALERT */
.alert {
  border-radius: 12px; padding: 12px 14px; margin-bottom: 12px;
  font-size: 14px; font-weight: 500; line-height: 1.4;
  display: flex; align-items: flex-start; gap: 8px;
  border: 1px solid;
}
.alert.red  { background: var(--red-bg);   color: #FCA5A5; border-color: rgba(248,113,113,.3); }
.alert.amber{ background: var(--amber-bg); color: #FCD34D; border-color: rgba(245,158,11,.3); }

/* MODO DESCANSO */
.rest-card{
  background:linear-gradient(135deg,rgba(248,113,113,.08),rgba(248,113,113,.04));
  border:1px solid rgba(248,113,113,.25);border-radius:16px;
  padding:18px;margin-bottom:14px;
}
.rest-card-title{font-size:15px;font-weight:700;color:#FCA5A5;margin-bottom:4px;display:flex;align-items:center;gap:7px;}
.rest-card-sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.rest-suggestions{display:flex;flex-direction:column;gap:6px;}
.rest-btn{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1px solid rgba(52,211,153,.2);
  cursor:pointer;transition:background .15s;text-align:left;
}
.rest-btn:hover,.rest-btn:active{background:rgba(52,211,153,.08);}
.rest-btn-ico{font-size:18px;flex-shrink:0;}
.rest-btn-txt{flex:1;}
.rest-btn-label{font-size:13px;font-weight:600;color:var(--text);}
.rest-btn-pts{font-size:11px;color:#34D399;font-weight:700;}

/* BANNER DE ATUALIZAÇÃO */
.update-banner{
  background:linear-gradient(135deg,rgba(6,182,212,.12),rgba(124,58,237,.08));
  border:1px solid rgba(6,182,212,.3);border-radius:12px;
  padding:12px 14px;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.update-banner-txt{flex:1;font-size:13px;color:var(--text2);line-height:1.4;}
.update-banner-txt strong{color:var(--cyan-lt);display:block;font-size:14px;margin-bottom:2px;}
.update-banner-btn{
  padding:7px 14px;border-radius:8px;border:none;
  background:var(--accent);color:#fff;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;white-space:nowrap;
}

/* AGENDADOS */
.sched-card{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid rgba(245,158,11,.2);}
.sched-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
.sched-row+.sched-row{border-top:1px solid var(--border);}
.sched-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sched-time{font-size:12px;font-weight:700;color:var(--accent-lt);min-width:36px;}
.sched-label{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.sched-pts{font-size:12px;font-weight:700;color:#F87171;}
.sched-del{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;}
.add-sched-btn{
  width:100%;padding:9px;border-radius:9px;border:1px dashed rgba(245,158,11,.3);
  background:none;color:var(--amber);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;margin-top:6px;
}

/* PERIOD CARDS */
.period-row { display: flex; gap: 8px; }
.period-card {
  flex: 1; background: var(--card2); border-radius: 14px;
  padding: 12px 6px; text-align: center;
  border: 1.5px solid var(--border);
  position: relative; min-height: 96px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  transition: border-color .2s;
}
.period-card.done  { border-color: rgba(16,185,129,.4); }
.period-card.active{ border-color: var(--purple); background: var(--purple-bg); cursor: pointer; }
.period-card.tappable { cursor: pointer; }
.pc-period-icon { font-size: 18px; }
.pc-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; font-weight: 700; }
.pc-energy { font-size: 24px; font-weight: 800; }
.pc-humor { font-size: 13px; }
.pc-tap { font-size: 10px; color: var(--purple-lt); font-weight: 600; }
.pc-done-icon { position: absolute; top: 5px; right: 6px; font-size: 11px; }

/* ENTRIES */
.entry { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--border); }
.entry:last-child { border-bottom: none; padding-bottom: 0; }
.e-ico { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.e-txt { flex: 1; min-width: 0; }
.e-name { font-size: 14px; font-weight: 500; color: var(--text); }
.e-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.e-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.e-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.e-cost { font-size: 16px; font-weight: 700; min-width: 34px; text-align: right; }
.e-cost.d { color: var(--red); } .e-cost.r { color: var(--green); }
.e-del { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: var(--muted); font-size: 14px; display: flex; align-items: center; justify-content: center; border-radius: 6px; }

.empty { text-align: center; padding: 28px 12px; color: var(--muted); }
.e-icon { font-size: 44px; margin-bottom: 10px; }
.e-msg { font-size: 14px; line-height: 1.6; color: var(--muted); }

/* REGISTER BAR */
.reg-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border-radius: 14px; padding: 12px 14px;
  margin-bottom: 14px; border: 1px solid var(--border); box-shadow: var(--sh);
}
.reg-bar-pts { font-size: 24px; font-weight: 800; min-width: 36px; text-align: right; }

/* CATEGORY GRID */
.type-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; padding: 4px 2px 8px; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.cat-btn {
  border: 1.5px solid var(--border); background: var(--card2); border-radius: 12px;
  padding: 11px 10px; cursor: pointer; text-align: left;
  display: flex; flex-direction: column; gap: 4px; position: relative;
  transition: border-color .15s, background .15s, transform .1s; font-family: inherit;
}
.cat-btn:active { transform: scale(.97); border-color: var(--purple); background: var(--purple-bg); }
.ci-icon { font-size: 20px; }
.cl { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.2; }
.cc { font-size: 11px; color: var(--muted); }
.cat-info-btn {
  position: absolute; top: 6px; right: 7px;
  font-size: 13px; color: var(--muted); opacity: .6;
  line-height: 1; padding: 2px;
}
.cat-info-btn:hover { opacity: 1; color: var(--accent-lt); }

/* INTENSITY */
.int-row { display: flex; gap: 8px; margin-bottom: 14px; }
.int-btn {
  flex: 1; padding: 10px 6px; border: 1.5px solid var(--border);
  background: var(--card2); border-radius: 10px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--muted);
  text-align: center; font-family: inherit; transition: all .15s;
}
.int-btn.sel { border-color: var(--purple); color: var(--purple-lt); background: var(--purple-bg); }

.cost-prev { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.cost-prev strong { color: var(--purple-lt); font-size: 15px; }

/* NOTE */
.note {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px; font-size: 14px; font-family: inherit; color: var(--text);
  background: var(--card2); resize: none; outline: none;
  transition: border-color .15s; display: block; margin-bottom: 12px;
}
.note::placeholder { color: var(--muted); }
.note:focus { border-color: var(--purple); }

/* BUTTONS */
.btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s, transform .1s; }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
.btn-p { background: linear-gradient(135deg, var(--purple-dk), var(--purple-lt)); color: #fff; }
.btn-d { background: transparent; color: var(--red); border: 1.5px solid var(--red); }
.btn-sm { padding: 10px 18px; font-size: 14px; width: auto; }

/* SETTINGS */
.s-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); }
.s-row:last-child { border-bottom: none; padding-bottom: 0; }
.s-lbl { font-size: 15px; font-weight: 500; color: var(--text); }
.s-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; max-width: 200px; }
.ctr { display: flex; align-items: center; gap: 10px; }
.ctr-btn { width: 34px; height: 34px; border: 1.5px solid var(--border); background: var(--card2); border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text); font-family: inherit; }
.ctr-val { font-size: 20px; font-weight: 800; color: var(--purple-lt); min-width: 28px; text-align: center; }

.chart-wrap { position: relative; }

/* TOAST */
.toast {
  position: fixed; top: calc(66px + env(safe-area-inset-top, 0px));
  left: 50%; transform: translateX(-50%);
  background: var(--card2); color: var(--text);
  border: 1px solid var(--border);
  padding: 11px 18px; border-radius: 24px; font-size: 14px; font-weight: 500;
  z-index: 999; white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  animation: ta 3s ease forwards;
}
@keyframes ta { 0%{opacity:0;transform:translateX(-50%) translateY(-8px)} 12%{opacity:1;transform:translateX(-50%) translateY(0)} 75%{opacity:1} 100%{opacity:0} }

/* BACKDROP / SHEET */
.backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7);
  display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
  animation: bdIn .2s ease;
}
@keyframes bdIn { from{opacity:0} to{opacity:1} }

.sheet {
  background: var(--card); border-radius: 24px 24px 0 0;
  width: 100%; max-width: 430px;
  border-top: 1px solid var(--border);
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  animation: shUp .25s cubic-bezier(.32,1,.32,1);
  max-height: 88vh; overflow-y: auto;
}
@keyframes shUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }

.sh-handle { width: 36px; height: 4px; background: rgba(255,255,255,.12); border-radius: 99px; margin: 12px auto 0; }

/* CHECK-IN SHEET */
.ci-hdr { padding: 12px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.ci-period-lbl { font-size: 13px; font-weight: 700; color: var(--purple-lt); text-transform: uppercase; letter-spacing: .6px; }
.ci-skip { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 4px 0; font-family: inherit; }
.ci-body { padding: 16px 20px 8px; }
.ci-q { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 20px; line-height: 1.3; }

/* ENERGY SLIDER */
.energy-circle {
  width: 96px; height: 96px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; margin: 0 auto 8px;
  background: var(--card2); border: 2px solid var(--border);
  transition: border-color .3s;
}
.energy-number { text-align: center; font-size: 52px; font-weight: 800; line-height: 1; margin-bottom: 4px; transition: color .2s; }
.energy-label  { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 16px; }

.slider-wrap { margin: 0 4px 8px; }
.energy-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 8px; border-radius: 99px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--purple-dk), #EC4899);
}
.energy-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 28px; height: 28px; border-radius: 50%;
  background: #fff; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 6px; }

/* SENSORIAL ITEMS */
.sens-section { margin: 16px 0 8px; }
.sens-lbl-hdr { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 10px; }
.sens-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.sens-item:last-child { border-bottom: none; }
.sens-name { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; color: var(--text); }
.sens-nums { display: flex; gap: 5px; }
.sens-num {
  width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border);
  background: var(--card2); color: var(--muted); font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-family: inherit; transition: all .15s;
}
.sens-num.sel { border-color: var(--purple); background: var(--purple-bg); color: var(--purple-lt); }

/* SOCIAL BATTERY */
.battery-section { margin: 20px 0 16px; }
.battery-label { font-size: 13px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.battery-bar-wrap { display: flex; align-items: center; gap: 10px; }
.battery-icon { font-size: 22px; }
.battery-track { flex: 1; height: 14px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
.battery-fill { height: 100%; border-radius: 99px; transition: width .3s, background .3s; }
.battery-val { font-size: 16px; font-weight: 800; min-width: 24px; text-align: right; }
.battery-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 6px; border-radius: 99px; outline: none; cursor: pointer;
  background: transparent; margin-top: 8px;
}
.battery-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 24px; height: 24px; border-radius: 50%;

.humor-btn {
  border: 1.5px solid var(--border); background: var(--card2); border-radius: 12px;

  transition: all .15s;

.humor-btn .h-ico { font-size: 26px; }
.humor-btn .h-lbl { font-size: 11px; color: var(--muted); font-weight: 600; line-height: 1.2; }
.humor-btn.sel { border-color: var(--purple); background: var(--purple-bg); }
.humor-btn.sel .h-lbl { color: var(--purple-lt); }

/* CATEGORY SHEET */

.cat-sh-ico { width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
.cat-sh-name { font-size: 18px; font-weight: 700; color: var(--text); }
.cat-sh-type { font-size: 12px; color: var(--muted); margin-top: 2px; }
.cat-sh-body { padding: 16px 20px; }

/* CUSTOM TRIGGER SHEET */
.text-input {
  width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px; font-size: 14px; font-family: inherit; color: var(--text);
  background: var(--card2); outline: none;
  transition: border-color .15s; display: block; margin-bottom: 12px;
}
.text-input::placeholder { color: var(--muted); }
.text-input:focus { border-color: var(--purple); }

/* REPORT */
.report-pre {
  font-size: 12px; line-height: 1.8; color: var(--text2); white-space: pre-wrap;
  font-family: 'Courier New', monospace; background: var(--card2);
  border-radius: 10px; padding: 14px; margin-bottom: 14px;
  max-height: 50vh; overflow-y: auto; border: 1px solid var(--border);
}

/* HEATMAP */
.heatmap-wrap { overflow-x: auto; margin-top: 8px; }
.heatmap-grid {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  gap: 3px; min-width: 280px;
}
.hm-head { font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted); text-align: center; padding: 4px 2px; }
.hm-row-lbl { font-size: 10px; color: var(--muted); display: flex; align-items: center; padding-right: 4px; font-weight: 600; }
.hm-cell {
  aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; cursor: default; transition: opacity .2s;
}

/* SOS SCREEN */
.sos-banner {
  background: linear-gradient(135deg, rgba(248,113,113,.2), rgba(139,92,246,.2));
  border: 1px solid rgba(248,113,113,.3); border-radius: var(--r);
  padding: 16px; margin-bottom: 14px; text-align: center;
}
.sos-banner-title { font-size: 22px; font-weight: 800; color: #FCA5A5; margin-bottom: 4px; }
.sos-banner-sub { font-size: 13px; color: var(--text2); }

.sos-module {
  background: var(--card); border-radius: var(--r);
  border: 1px solid var(--border); margin-bottom: 12px; overflow: hidden;
}
.sos-module-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; cursor: pointer; user-select: none;
}
.sos-module-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--text); }
.sos-module-ico { font-size: 20px; }
.sos-chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
.sos-chevron.open { transform: rotate(180deg); }
.sos-module-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }

/* POMODORO */
.pomo-display {
  text-align: center; padding: 20px 0 12px;
}
.pomo-time {
  font-size: 56px; font-weight: 800; font-variant-numeric: tabular-nums;
  letter-spacing: -2px; color: var(--text);
}
.pomo-phase { font-size: 13px; color: var(--muted); margin-top: 4px; margin-bottom: 16px; }
.pomo-btns { display: flex; gap: 8px; }
.pomo-btn {
  flex: 1; padding: 11px; border: 1.5px solid var(--border);
  background: var(--card2); border-radius: 10px; cursor: pointer;
  font-size: 14px; font-weight: 700; color: var(--text); font-family: inherit;
  transition: all .15s;
}
.pomo-btn.primary { background: var(--purple-bg); border-color: var(--purple); color: var(--purple-lt); }

/* BREATHING */
.breath-wrap { text-align: center; padding: 16px 0; }
.breath-circle {
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(139,92,246,.2); border: 2px solid var(--purple);
  margin: 0 auto 12px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--purple-lt);
}
@keyframes breathExpand    { from{transform:scale(1);background:rgba(139,92,246,.2)} to{transform:scale(1.5);background:rgba(139,92,246,.4)} }
@keyframes breathHoldFull  { from{transform:scale(1.5);background:rgba(139,92,246,.4)} to{transform:scale(1.5);background:rgba(139,92,246,.4)} }
@keyframes breathShrink    { from{transform:scale(1.5);background:rgba(139,92,246,.4)} to{transform:scale(1);background:rgba(139,92,246,.2)} }
@keyframes breathHoldEmpty { from{transform:scale(1);background:rgba(139,92,246,.2)} to{transform:scale(1);background:rgba(139,92,246,.2)} }
.breath-circle.anim-expand     { animation: breathExpand    4s ease-in-out forwards; }
.breath-circle.anim-hold-full  { animation: breathHoldFull  4s linear forwards; }
.breath-circle.anim-shrink     { animation: breathShrink    4s ease-in-out forwards; }
.breath-circle.anim-hold-empty { animation: breathHoldEmpty 4s linear forwards; }
.breath-instruction { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.breath-count { font-size: 28px; font-weight: 800; color: var(--purple-lt); margin-bottom: 12px; }
.breath-cycle { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

/* GROUNDING */
.ground-steps { margin: 12px 0; }
.ground-step {

}
.ground-step.active { border-color: var(--purple); background: var(--purple-bg); color: var(--text); }
.ground-step.done { border-color: rgba(16,185,129,.4); background: var(--green-bg); color: var(--green); }
.ground-step-n { font-weight: 800; font-size: 16px; margin-right: 6px; }

/* AFFIRMATION */
.affirm-card {
  background: var(--card2); border-radius: 12px; padding: 16px;

.affirm-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.5; margin-bottom: 12px; }

/* CHECKLIST */
.cl-item {
  display: flex; align-items: center; gap: 10px;

}
.cl-item:last-child { border-bottom: none; }
.cl-check {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all .15s;
}
.cl-check.checked { background: var(--green); border-color: var(--green); }
.cl-text { font-size: 14px; color: var(--text); }
.cl-text.checked { text-decoration: line-through; color: var(--muted); }

/* ONBOARDING */
.onboard-overlay {
  position: fixed; inset: 0; z-index: 400;

}

// g(ela, ele, elu) — retorna forma correta baseado no pronome salvo
function g(ela, ele, elu){
  const p=db.settings.pronoun;
  if(p==='ele') return ele;
  if(p==='elu') return elu||ela;
  return ela; // default feminine (null ou 'ela')
}
// gword(palavra_feminina) — conjuga automaticamente terminação -a → -o/-u
function gword(fem){
  const p=db.settings.pronoun;
  if(!p||p==='ela') return fem;
  const suf=p==='ele'?'o':'u';
  return fem.replace(/as$/,suf+'s').replace(/a$/,suf);
}
// humorLabel(h) — retorna label do humor conjugado no pronome do usuário
function humorLabel(h){ return gword(h.label); }
// catLabel(c) — retorna label da categoria adaptado ao pronome (só para as gendrificadas)
function catLabel(c){
  if(c.id==='sozinha') return g('Tempo sozinha','Tempo sozinho','Tempo a sós');
  return c.label;
}

function calcStreak(){
  const dates=[...new Set(db.checkins.map(c=>c.date))].sort().reverse();
  if(!dates.length)return 0;
  const today=todayStr();
  const prev=(d,n)=>{const x=new Date(d+'T12:00');x.setDate(x.getDate()-n);return x.toISOString().slice(0,10);};
  if(dates[0]!==today&&dates[0]!==prev(today,1))return 0;
  let streak=0,exp=dates[0]===today?today:prev(today,1);
  for(const d of dates){if(d===exp){streak++;exp=prev(exp,1);}else break;}
  return streak;
}

function isHardDay(date){return (db.hardDays||[]).includes(date||todayStr());}
function entryCost(e){
  const c=cat(e.categoryId);if(!c)return 0;
  return Math.round(c.cost*(INTS[e.intensity]?.mult??1)*10)/10;
}
function effectiveDailyPts(date){
  return isHardDay(date||viewDate) ? Math.round(db.settings.dailyPts*0.5) : db.settings.dailyPts;
}
function toggleHardDay(){
  if(!db.hardDays) db.hardDays=[];
  const today=todayStr();
  const idx=db.hardDays.indexOf(today);
  if(idx>=0) db.hardDays.splice(idx,1);
  else{ db.hardDays.push(today); trackEvent('hard_day_activated'); }
  save(); document.getElementById('main').innerHTML=homeHTML();
}
function toggleFavorite(id){
  if(!db.settings.favorites) db.settings.favorites=[];
  const idx=db.settings.favorites.indexOf(id);
  if(idx>=0) db.settings.favorites.splice(idx,1); else db.settings.favorites.push(id);

function remaining(){
  const max=effectiveDailyPts(viewDate);

}

function openCheckin(pid){
  checkinState={step:1, energy:7, sensorial:{barulho:null,toque:null,cheiro:null}, socialBattery:7, humor:null, note:'', forcePeriod:pid||null};
  renderOverlays();
}

function setEnergy(v){
  if(!checkinState)return;
  checkinState.energy=parseInt(v);
  const col=energyColor(checkinState.energy);
  const circ=document.getElementById('ci-circle'); if(circ){circ.style.borderColor=col;circ.style.boxShadow=`0 0 20px ${col}40`;}
  const num=document.getElementById('ci-num'); if(num){num.textContent=checkinState.energy;num.style.color=col;}
  const lbl=document.getElementById('ci-lbl'); if(lbl) lbl.textContent=energyLabel(checkinState.energy);
  const em=document.getElementById('ci-emoji'); if(em) em.textContent=energyEmoji(checkinState.energy);
}

function setSensorial(sense, val){
  if(!checkinState)return;
  checkinState.sensorial[sense]=val;
  document.querySelectorAll(`.sens-num[data-sense="${sense}"]`).forEach(b=>{
    b.classList.toggle('sel', parseInt(b.dataset.val)===val);
  });
  // Enable continue if all sensorial picked (optional — allow skipping)
}

function setSocialBattery(v){
  if(!checkinState)return;
  checkinState.socialBattery=parseInt(v);
  const col=batteryColor(checkinState.socialBattery);
  const fill=document.getElementById('bat-fill');
  if(fill){fill.style.width=(checkinState.socialBattery/10*100)+'%';fill.style.background=col;}
  const val=document.getElementById('bat-val');
  if(val){val.textContent=checkinState.socialBattery;val.style.color=col;}
  const bi=document.getElementById('bat-icon');
  if(bi) bi.textContent=checkinState.socialBattery>=7?'🔋':checkinState.socialBattery>=4?'🪫':'📵';
}

function checkinNext(){if(!checkinState||checkinState.step!==1)return;checkinState.step=2;renderOverlays();}
function checkinBack(){if(!checkinState||checkinState.step!==2)return;checkinState.step=1;renderOverlays();}

function pickHumor(id){
  if(!checkinState)return;
  checkinState.humor=id;
  document.querySelectorAll('.humor-btn').forEach(b=>{
    b.classList.toggle('sel', b.dataset.id===id);
    b.querySelector('.h-lbl').style.color = b.dataset.id===id?'var(--purple-lt)':'var(--muted)';
  });
  document.querySelector('.btn[onclick="submitCheckin()"]')?.removeAttribute('disabled');
}

function submitCheckin(){
  if(!checkinState||!checkinState.humor)return;
  const p=checkinState.forcePeriod||currentPeriod();
  db.checkins.push({
    id:uid(), date:todayStr(), period:p,
    energy:checkinState.energy,
    humor:checkinState.humor,
    sensorial:checkinState.sensorial,
    socialBattery:checkinState.socialBattery,
    note:checkinState.note||'',
    createdAt:new Date().toISOString()
  });
  save();
  trackEvent('checkin_completed',{period:p,energy:db.checkins[db.checkins.length-1].energy});
  const h=HUMORS.find(x=>x.id===checkinState.humor);
  toast(`${h?.icon??''} Check-in da ${PERIODS[p]?.label} salvo!`);
  checkinState=null;
  if(tourStep===2){ tourStep=3; go('register'); } else { render(); }
}
function submitCheckinExpress(){
  if(!checkinState)return;
  const p=checkinState.forcePeriod||currentPeriod();
  db.checkins.push({
    id:uid(), date:todayStr(), period:p,
    energy:checkinState.energy,
    humor:null, sensorial:checkinState.sensorial,
    socialBattery:checkinState.socialBattery,
    note:'', express:true,
    createdAt:new Date().toISOString()
  });
  save();
  trackEvent('checkin_completed',{period:p,energy:checkinState.energy,express:true});
  toast(`✅ Energia registrada — cuide-se!`);
  checkinState=null;
  if(tourStep===2){ tourStep=3; go('register'); } else { render(); }
}
function skipCheckin(){checkinSkipped=true;checkinState=null;renderOverlays();}

// ── SHEET ─────────────────────────────────────────────────────────────────────

function openSheet(catId){sheetState={catId,intensity:'normal',note:''};renderOverlays();}
function closeSheet(){sheetState=null;renderOverlays();}

function setSheetInt(k){
  if(!sheetState)return;
  sheetState.intensity=k;
  document.querySelectorAll('.int-btn').forEach(b=>b.classList.toggle('sel',b.dataset.k===k));
  const c=cat(sheetState.catId);if(!c)return;
  const cost=Math.round(c.cost*(INTS[k]?.mult??1)*10)/10;
  const el=document.getElementById('sh-cost');if(el)el.textContent=Math.abs(cost);
}
function updateSheetNote(v){if(sheetState)sheetState.note=v;}

function submitSheet(){
  if(!sheetState)return;
  const e={id:uid(),date:todayStr(),createdAt:new Date().toISOString(),categoryId:sheetState.catId,intensity:sheetState.intensity,note:sheetState.note.trim()};
  db.entries.push(e);save();
  trackEvent('entry_registered',{type:cat(e.categoryId)?.type||'unknown'});
  const c=cat(e.categoryId),cost=entryCost(e),isR=c?.type==='recuperacao';
  toast(isR?`${c.icon} Recuperação! ${Math.abs(cost)} pts devolvidos`:`${c?.icon??''} Registrado — ${cost} pts usados`);
  sheetState=null;go('home');
}

function delEntry(id){
  const e=db.entries.find(x=>x.id===id);if(!e)return;
  const label=e.categoryId==='_custom_trigger'?e.triggerDesc:cat(e.categoryId)?.label??'registro';
  if(!confirm(`Remover "${label}"?`))return;
  db.entries=db.entries.filter(x=>x.id!==id);save();
  document.getElementById('main').innerHTML=homeHTML();
}

if(!db.scheduled) db.scheduled=[];

function applyDueScheduled(){
  const now=new Date();
  const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const today=todayStr();
  let changed=false;
  db.scheduled.filter(s=>!s.applied&&s.date===today&&s.time<=hhmm).forEach(s=>{
    db.entries.push({id:uid(),date:today,createdAt:new Date().toISOString(),
      categoryId:s.categoryId,intensity:s.intensity||'normal',note:s.note||'(agendado)'});
    s.applied=true;changed=true;
    toast(`⏰ "${cat(s.categoryId)?.label??s.categoryId}" aplicado automaticamente`);
  });
  if(changed){save();render();}
}

function addScheduled(catId,time,intensity='normal',note=''){
  if(!db.scheduled)db.scheduled=[];
  db.scheduled.push({id:uid(),date:todayStr(),catId,categoryId:catId,
    time,intensity,note,applied:false});
  save();render();
  toast(`⏰ Agendado para ${time}`);
}

function delScheduled(id){
  db.scheduled=db.scheduled.filter(s=>s.id!==id);
  save();render();
}

function addComfortItem(){

  if(!input)return;
  const text=input.value.trim();
  if(!text)return;
  if(!db.settings.comfortList)db.settings.comfortList=[];
  db.settings.comfortList.push({text,done:false});
  save();
  document.getElementById('main-sos')
    ? document.getElementById('main-sos').innerHTML=sosHTML()
    : render();
}

function delComfortItem(idx){
  if(!db.settings.comfortList)return;
  db.settings.comfortList.splice(idx,1);
  save();render();
}

function toggleComfortItem(idx){
  if(!db.settings.comfortList)return;
  db.settings.comfortList[idx].done=!db.settings.comfortList[idx].done;
  save();render();
}

function openSchedSheet(){

function adj(key,delta){
  const{dailyPts,alertAt}=db.settings;
  if(key==='dailyPts')db.settings.dailyPts=Math.max(1,Math.min(24,dailyPts+delta));
  if(key==='alertAt')db.settings.alertAt=Math.max(1,Math.min(dailyPts-1,alertAt+delta));
  save();document.getElementById('main').innerHTML=settingsHTML();
}

function exportJSON(){
  const data = JSON.stringify({...db, exportedAt: new Date().toISOString()}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `recarregue-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('Backup exportado com sucesso 💜');
}

function importJSON(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if(!parsed.entries || !parsed.checkins) throw new Error('Arquivo inválido');
        db.entries = parsed.entries || [];
        db.checkins = parsed.checkins || [];
        db.settings = {...db.settings, ...(parsed.settings||{})};
        save(); applyTheme(); render();
        toast('Dados restaurados com sucesso 💜');
      } catch(_){ toast('Arquivo inválido. Verifique e tente novamente.'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

async function backupToCloud(){
  if(!SUPABASE_URL){ toast('Backup na nuvem não configurado ainda.'); return; }
  const code = getRestoreCode();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/backups`, {
      method: 'POST',
      headers: {'Content-Type':'application/json','apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,
        'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({restore_code: code, data: db, updated_at: new Date().toISOString()})
    });
    if(!res.ok) throw new Error();
    localStorage.setItem(LAST_BACKUP_KEY,Date.now().toString());
    trackEvent('backup_created');
    toast('Backup salvo na nuvem 💜');
    render();
  } catch(_){ toast('Erro ao salvar na nuvem. Tente novamente.'); }
}

async function restoreFromCloud(){
  if(!SUPABASE_URL){ toast('Backup na nuvem não configurado ainda.'); return; }
  const input = document.getElementById('restore-code-input');
  const code = input?.value.trim();
  if(!code || code.length < 10){ toast('Digite seu código de restauração.'); return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/backups?restore_code=eq.${encodeURIComponent(code)}&select=data`, {
      headers: {'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`}
    });
    const rows = await res.json();
    if(!rows?.length){ toast('Código não encontrado.'); return; }
    const saved = rows[0].data;
    db.entries = saved.entries || [];
    db.checkins = saved.checkins || [];
    db.settings = {...db.settings, ...(saved.settings||{})};
    localStorage.setItem(BACKUP_KEY, code);
    save(); applyTheme(); render();
    toast('Dados restaurados da nuvem 💜');
  } catch(_){ toast('Erro ao restaurar. Verifique o código.'); }
}

async function requestNotifPermission(){
  if(!('Notification' in window)){toast('Notificações não suportadas');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){db.settings.notifEnabled=true;save();toast('Notificações ativadas! ✅');scheduleNotifs();}
  else toast('Permissão negada. Ative nas configurações do celular.');
  document.getElementById('main').innerHTML=settingsHTML();
}
function setSilentMode(hours){
  silentUntil=hours===0?0:Date.now()+hours*60*60*1000;
  go('sos');
  if(hours>0)toast(`🔕 Notificações silenciadas por ${hours}h`);
  else toast('🔔 Notificações reativadas');
}

function scheduleNotifs(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=new Date();
  Object.entries(PERIODS).forEach(([pid,pd])=>{
    if(periodCheckin(pid))return;
    const fire=new Date();fire.setHours(pd.notifHour,0,0,0);
    const delay=fire-now;
    if(delay>0&&delay<18*60*60*1000){
      setTimeout(()=>{
        if(!periodCheckin(pid)&&Notification.permission==='granted'&&Date.now()>silentUntil)
          new Notification('Recarregue',{body:`Como está sua energia nessa ${pd.label.toLowerCase()}?`,icon:'./icon.png',tag:`checkin-${pid}`});
      },delay);
    }
  });
  // Resumo do dia às 22h
  const summary=new Date();summary.setHours(22,0,0,0);
  const summaryDelay=summary-now;
  if(summaryDelay>0&&summaryDelay<24*60*60*1000){
    setTimeout(()=>{
      if(Notification.permission!=='granted')return;
      const es=db.entries.filter(e=>e.date===todayStr());
      const rem=db.settings.dailyPts-es.reduce((s,e)=>s+entryCost(e),0);
      const topDrain=()=>{
        const c={};
        es.filter(e=>cat(e.categoryId)?.type!=='recuperacao'&&e.categoryId!=='_custom_trigger')
          .forEach(e=>{c[e.categoryId]=(c[e.categoryId]||0)+1;});
        const top=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];
        return top?cat(top[0])?.label:'—';
      };
      const recoveries=es.filter(e=>cat(e.categoryId)?.type==='recuperacao').length;
      new Notification('Recarregue — resumo do dia',{
        body:`Energia restante: ${Math.round(Math.max(0,rem))} pts · Maior dreno: ${topDrain()} · Recuperações: ${recoveries}`,
        icon:'./icon.png',tag:'resumo-dia'
      });
    },summaryDelay);
  }
}

function entryDisplayCost(e){
  if(e.categoryId==='_custom_trigger')return e._customCost??2;

function buildReportText(){
  const today=new Date(),d7=new Date();d7.setDate(d7.getDate()-7);
  const recent=db.entries.filter(e=>new Date(e.date)>=d7);
  const recentCi=db.checkins.filter(c=>new Date(c.date)>=d7);
  const days=new Set(recent.map(e=>e.date)).size;
  const name=db.settings.name||g('Usuária','Usuário','Usuáriu');
  const start=d7.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const end=today.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Drenos
  const byId={};
  recent.filter(e=>e.categoryId!=='_custom_trigger').forEach(e=>{
    const c=cat(e.categoryId);if(c&&c.type!=='recuperacao'){
      if(!byId[e.categoryId])byId[e.categoryId]={count:0,pts:0};
      byId[e.categoryId].count++;byId[e.categoryId].pts+=Math.abs(entryCost(e));
    }
  });
  const top=Object.entries(byId).filter(([id])=>cat(id)).sort((a,b)=>b[1].pts-a[1].pts).slice(0,5);

  // Recuperações
  const recov=recent.filter(e=>cat(e.categoryId)?.type==='recuperacao');
  const byRec={};recov.forEach(e=>{const c=cat(e.categoryId);byRec[c.id]=(byRec[c.id]||0)+1;});
  const topRec=Object.entries(byRec).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Energia e bateria social
  const avgEn=recentCi.length>0?(recentCi.reduce((s,c)=>s+c.energy,0)/recentCi.length).toFixed(1):'—';
  const avgBat=recentCi.filter(c=>c.socialBattery!=null).length>0
    ?(recentCi.filter(c=>c.socialBattery!=null).reduce((s,c)=>s+(c.socialBattery??0),0)/recentCi.filter(c=>c.socialBattery!=null).length).toFixed(1):'—';

  // Energia por período
  const enByPeriod={manha:[],tarde:[],noite:[]};
  recentCi.forEach(c=>{if(enByPeriod[c.period])enByPeriod[c.period].push(c.energy);});

  // Humor
  const humorPer={};
  recentCi.forEach(c=>{if(!humorPer[c.period])humorPer[c.period]={};humorPer[c.period][c.humor]=(humorPer[c.period][c.humor]||0)+1;});

  // Energia por dia da semana
  const dow=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const enByDow={};
  recentCi.forEach(c=>{const d=dow[new Date(c.date+'T12:00').getDay()];if(!enByDow[d])enByDow[d]=[];enByDow[d].push(c.energy);});
  const dowEntries=Object.entries(enByDow).map(([d,arr])=>({d,avg:(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1)})).sort((a,b)=>b.avg-a.avg);

  // Dias difíceis
  const hardThisWeek=(db.hardDays||[]).filter(d=>new Date(d)>=d7);

  // Gatilhos customizados
  const customTriggers=recent.filter(e=>e.categoryId==='_custom_trigger');

  // Sintomas
  const recentSinR=(db.sintomas?.registros||[]).filter(e=>new Date(e.date)>=d7);
  const listaR=db.sintomas?.lista||SINTOMAS_DEFAULT;
  const byCatR={fisico:[],emocional:[],cognitivo:[]};
  const byIdR={};
  recentSinR.forEach(rs=>{if(!byIdR[rs.sintomaId]){byIdR[rs.sintomaId]={count:0,total:0};}byIdR[rs.sintomaId].count++;byIdR[rs.sintomaId].total+=rs.intensidade;});
  Object.entries(byIdR).forEach(([id,d])=>{const s=listaR.find(x=>x.id===id);if(s&&byCatR[s.cat])byCatR[s.cat].push({s,d});});

  // Insights (texto plano)
  const insightsRaw=[];
  if(top.length>0){const c=cat(top[0][0]);if(c)insightsRaw.push(`${c.icon} ${c.label} é seu maior dreno essa semana (${top[0][1].count}×).`);}
  const recPct=recent.length>0?Math.round(recov.length/recent.length*100):0;
  if(recPct<20)insightsRaw.push(`Só ${recPct}% dos registros são recuperações — tente equilibrar mais.`);
  else if(recPct>=30)insightsRaw.push(`${recPct}% dos registros são recuperações — você está se cuidando bem.`);
  if(recentCi.length>=3)insightsRaw.push(`Energia média de ${avgEn}/10 — ${+avgEn>=7?'boa semana 💚':+avgEn>=4?'semana moderada 🟡':'semana pesada 🔴'}.`);
  if(dowEntries.length>=3){insightsRaw.push(`Melhor dia: ${dowEntries[0].d} (${dowEntries[0].avg}/10). Dia mais pesado: ${dowEntries[dowEntries.length-1].d} (${dowEntries[dowEntries.length-1].avg}/10).`);}
  if(hardThisWeek.length>0){const hdDow=hardThisWeek.map(d=>dow[new Date(d+'T12:00').getDay()]).join(', ');insightsRaw.push(`Dias difíceis marcados: ${hdDow}.`);}
  // correlação cognitivo × alta carga
  const cogDates=new Set(recentSinR.filter(r=>listaR.find(x=>x.id===r.sintomaId)?.cat==='cognitivo').map(r=>r.date));
  if(cogDates.size>=2){
    const ep=db.settings.dailyPts;
    const heavyDates=new Set([...cogDates].filter(d=>{const du=db.entries.filter(e=>e.date===d&&cat(e.categoryId)?.type!=='recuperacao').reduce((s,e)=>s+Math.abs(entryCost(e)),0);return du/ep>0.6;}));
    const overlap=[...cogDates].filter(d=>heavyDates.has(d)).length;
    if(overlap>=2)insightsRaw.push(`Névoa mental e alta carga energética coincidiram ${overlap}× — pode ser sinal de sobrecarga acumulando.`);
  }

  let r='';
  r+=`RELATÓRIO DE ENERGIA — ${name}\nPeríodo: ${start} a ${end}\n${'─'.repeat(36)}\n\n`;

  r+=`RESUMO\n`;
  r+=`• Dias com registros: ${days}\n`;
  r+=`• Total de eventos: ${recent.length}\n`;
  r+=`• Check-ins realizados: ${recentCi.length}\n`;
  r+=`• Energia média: ${avgEn}/10\n`;
  r+=`• Bateria social média: ${avgBat}/10\n`;
  if(hardThisWeek.length>0)r+=`• Dias difíceis: ${hardThisWeek.length}\n`;
  r+='\n';

  if(insightsRaw.length>0){r+=`INSIGHTS\n`;insightsRaw.forEach(i=>r+=`• ${i}\n`);r+='\n';}

  if(top.length>0){r+=`PRINCIPAIS DRENOS\n`;top.forEach(([id,d],i)=>{const c=cat(id);r+=`${i+1}. ${c.icon} ${c.label} — ${d.count}x — ${d.pts.toFixed(1)} pts\n`;});r+='\n';}

  if(topRec.length>0){r+=`RECUPERAÇÕES MAIS USADAS\n`;topRec.forEach(([id,n])=>{const c=cat(id);r+=`• ${c.icon} ${c.label} — ${n}x\n`;});r+='\n';}

  if(dowEntries.length>0){r+=`ENERGIA POR DIA DA SEMANA\n`;dowEntries.forEach(({d,avg})=>r+=`• ${d}: ${avg}/10\n`);r+='\n';}

  if(Object.keys(enByPeriod).some(p=>enByPeriod[p].length>0)){
    r+=`ENERGIA POR PERÍODO\n`;
    ['manha','tarde','noite'].forEach(pid=>{
      const arr=enByPeriod[pid];if(!arr.length)return;
      const avg=(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1);
      r+=`• ${PERIODS[pid].icon} ${PERIODS[pid].label}: ${avg}/10\n`;
    });
    r+='\n';
  }

  if(Object.keys(humorPer).length>0){
    r+=`HUMOR POR PERÍODO\n`;
    ['manha','tarde','noite'].forEach(pid=>{
      if(!humorPer[pid])return;
      const top1=Object.entries(humorPer[pid]).sort((a,b)=>b[1]-a[1])[0];
      const h=HUMORS.find(x=>x.id===top1[0]);
      r+=`• ${PERIODS[pid].icon} ${PERIODS[pid].label}: ${h?.icon??''} ${h?.label??''} (${top1[1]}x)\n`;
    });
    r+='\n';
  }

  if(customTriggers.length>0){
    r+=`GATILHOS NÃO MAPEADOS\n`;
    customTriggers.forEach(e=>{
      r+=`• 🎯 ${e.triggerDesc}`;
      if(e.sensation)r+=` | Sensação: ${e.sensation}`;
      r+=` | ${INTS[e.intensity]?.label??''} (${e._customCost??2} pts)\n`;
    });
    r+='\n';
  }

  if(recentSinR.length>0){
    r+=`SINTOMAS DA SEMANA\n`;
    const catLabelsR={fisico:'Físico',emocional:'Emocional',cognitivo:'Cognitivo'};
    Object.entries(byCatR).forEach(([catId,items])=>{
      if(!items.length)return;
      r+=`• ${catLabelsR[catId]}: `;
      r+=items.sort((a,b)=>b.d.count-a.d.count).map(({s,d})=>`${s.icon} ${s.label} (${d.count}×, int. ${(d.total/d.count).toFixed(1)})`).join(', ');
      r+='\n';
    });
    r+='\n';
  }

  r+=`${'─'.repeat(36)}\nGerado em ${today.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})}\nApp Recarregue — uso pessoal`;
  return r;
}

// Pomodoro
function fmtPomo(secs){
  const m=Math.floor(secs/60),s=secs%60;
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function pomoBtnLabel(){return pomo.running?'Pausar':'Iniciar';}
function pomoPhaseLabel(){
  if(pomo.phase==='foco')return '🎯 Foco';
  if(pomo.phase==='pausa_curta')return '☕ Pausa curta';
  return '🌟 Pausa longa';
}
function pomoDuration(phase){
  if(phase==='foco')return 25*60;
  if(phase==='pausa_curta')return 5*60;
  return 15*60;
}
function togglePomo(){
  if(pomo.running){
    clearInterval(pomo.interval);pomo.interval=null;pomo.running=false;
  } else {
    pomo.running=true;
    pomo.interval=setInterval(()=>{
      pomo.timeLeft--;
      if(pomo.timeLeft<=0){
        clearInterval(pomo.interval);pomo.interval=null;pomo.running=false;
        if(pomo.phase==='foco'){pomo.phase='pausa_curta';}
        else{pomo.phase='foco';}
        pomo.timeLeft=pomoDuration(pomo.phase);
        toast(pomo.phase==='foco'?'▶️ Hora de focar!':'☕ Pausa! Descanse.');
      }
      const el=document.getElementById('pomo-time');if(el)el.textContent=fmtPomo(pomo.timeLeft);
      const ph=document.getElementById('pomo-phase');if(ph)ph.textContent=pomoPhaseLabel();
      const pb=document.getElementById('pomo-start');if(pb)pb.textContent=pomoBtnLabel();
    },1000);
  }
  document.getElementById('main').innerHTML=sosHTML();
}
function resetPomo(){
  clearInterval(pomo.interval);pomo.interval=null;pomo.running=false;
  pomo.phase='foco';pomo.timeLeft=pomoDuration('foco');
  document.getElementById('main').innerHTML=sosHTML();
}
function setPomoPhase(p){
  clearInterval(pomo.interval);pomo.interval=null;pomo.running=false;
  pomo.phase=p;pomo.timeLeft=pomoDuration(p);
  document.getElementById('main').innerHTML=sosHTML();
}

// Breathing (box: 4-4-4-4)
const BREATH_PHASES=[
  {name:'Inspire',  secs:4, anim:'anim-expand'},
  {name:'Segure',   secs:4, anim:'anim-hold-full'},
  {name:'Expire',   secs:4, anim:'anim-shrink'},
  {name:'Segure',   secs:4, anim:'anim-hold-empty'},
];
function startBreathing(){
  if(breath.active)return stopBreathing();
  breath.active=true; breath.cycle=0;
  runBreathPhase(0,0);
}
function stopBreathing(){
  clearInterval(breath.interval);breath.active=false;
  const circ=document.getElementById('breath-circ');
  if(circ){
    circ.classList.remove('anim-expand','anim-hold-full','anim-shrink','anim-hold-empty');
    circ.style.transform='';
    circ.textContent='Respirar';
  }
  const inst=document.getElementById('breath-inst');if(inst)inst.textContent='';
  const cnt=document.getElementById('breath-cnt');if(cnt)cnt.textContent='';
  const cyc=document.getElementById('breath-cyc');if(cyc)cyc.textContent='';
  const sb=document.getElementById('breath-start');if(sb)sb.textContent='Iniciar respiração';
}
function runBreathPhase(phaseIdx, cycle){
  if(!breath.active)return;
  const ph=BREATH_PHASES[phaseIdx];
  breath.phase=ph.name; breath.timeLeft=ph.secs;
  const circ=document.getElementById('breath-circ');
  const inst=document.getElementById('breath-inst');
  const cnt=document.getElementById('breath-cnt');
  const cyc=document.getElementById('breath-cyc');
  const sb=document.getElementById('breath-start');
  if(circ){
    // remove todas as classes de animação e força reflow antes de aplicar a nova
    circ.classList.remove('anim-expand','anim-hold-full','anim-shrink','anim-hold-empty');
    void circ.offsetHeight; // força reflow para reiniciar a animação
    circ.textContent=ph.name;
    circ.classList.add(ph.anim);
  }
  if(inst)inst.textContent=ph.name;
  if(cnt)cnt.textContent=ph.secs;
  if(cyc)cyc.textContent=`Ciclo ${cycle+1}`;
  if(sb)sb.textContent='Parar';
  clearInterval(breath.interval);
  breath.interval=setInterval(()=>{
    breath.timeLeft--;
    if(cnt)cnt.textContent=Math.max(0,breath.timeLeft);
    if(breath.timeLeft<=0){
      clearInterval(breath.interval);
      const next=(phaseIdx+1)%BREATH_PHASES.length;
      const newCycle=next===0?cycle+1:cycle;
      if(newCycle>=4){stopBreathing();toast('🌿 Respiração completa — 4 ciclos');return;}
      runBreathPhase(next,newCycle);
    }
  },1000);
}

      ${ci
        ?`<div class="pc-energy" style="color:${energyColor(ci.energy)}">${ci.energy}</div>
          <div class="pc-humor">${h?.icon??''}</div>
          <div class="pc-done-icon">✅</div>`
        :isCurrent
          ?`<div class="pc-tap">Toque aqui</div>`
          :periodAvail
            ?`<div style="font-size:10px;color:var(--muted);margin-top:4px">registrar</div>`
            :`<div style="font-size:10px;color:rgba(255,255,255,.12);margin-top:4px">—</div>`
      }
    </div>`;
  }).join('');

  const es=todayEntries();
  const entries=es.length===0
    ?`<div class="empty"><div class="e-icon">🌱</div><div class="e-msg">Nenhum registro hoje ainda.<br>Toque em <b style="color:var(--purple-lt)">Registrar</b> para começar.</div></div>`
    :[...es].reverse().map(e=>{
        const isCustom=e.categoryId==='_custom_trigger';
        const cost=isCustom?e._customCost??2:entryCost(e);
        const c=isCustom?null:cat(e.categoryId);
        if(!isCustom&&!c)return'';
        const isR=!isCustom&&c.type==='recuperacao';
        const icon=isCustom?'🎯':c.icon;
        const label=isCustom?e.triggerDesc:c.label;
        const bg=isCustom?TYPE_BG.gatilho:(TYPE_BG[c.type]);
        const meta=isCustom?(e.sensation?`Sensação: ${e.sensation} · `:'')+(INTS[e.intensity]?.label??''):(fmtTime(e.createdAt)+' · '+(INTS[e.intensity]?.label??''));
        return `<div class="entry">
          <div class="e-ico" style="background:${bg}">${icon}</div>
          <div class="e-txt">
            <div class="e-name">${label}</div>
            <div class="e-meta">${meta}</div>
            ${e.note?`<div class="e-note">"${e.note}"</div>`:''}
          </div>
          <div class="e-right">
            <div class="e-cost ${isR?'r':'d'}">${isR?'−':'+'}${Math.abs(cost)}</div>
            <button class="e-del" onclick="delEntry('${e.id}')">✕</button>
          </div>
        </div>`;
      }).join('');

  const nameGreet=db.settings.name?`<div style="font-size:13px;color:var(--muted);margin-bottom:2px">Olá, <strong style="color:var(--accent-lt)">${db.settings.name}</strong> 👋</div>`:'';
  const backupBanner=needsBackupReminder()?`<div class="backup-remind-banner" onclick="backupToCloud()">☁️ Seus dados não têm backup recente — toque para salvar na nuvem</div>`:'';

  // Navegação de datas
  const isToday=viewDate===todayStr();
  const dayLabel=isToday?'Hoje':fmtDate(viewDate);
  const dateNav=`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0">
      <button onclick="navDay(-1)" style="background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px">‹</button>
      <span style="font-size:13px;font-weight:600;color:${isToday?'var(--accent-lt)':'var(--text2)'}">
        ${dayLabel}${isToday?' 📍':''}
      </span>
      <button onclick="navDay(1)" style="background:none;border:none;color:${isToday?'rgba(255,255,255,.15)':'var(--muted)'};font-size:22px;cursor:pointer;padding:4px 8px" ${isToday?'disabled':''}>›</button>
    </div>`;

  // Agendamentos de hoje (pendentes) — só no dia atual
  const todaySched=isToday?(db.scheduled||[]).filter(s=>s.date===todayStr()&&!s.applied):[];
  const schedSection=todaySched.length===0?'':`
    <div class="sched-card">
      <div class="sec" style="margin-bottom:8px">⏰ Agendado para hoje</div>
      ${todaySched.sort((a,b)=>a.time.localeCompare(b.time)).map(s=>{
        const c=cat(s.categoryId);
        const bg=c?TYPE_BG[c.type]:'rgba(245,158,11,.15)';
        return `<div class="sched-row">
          <span class="sched-time">${s.time}</span>
          <div class="sched-ico" style="background:${bg}">${c?.icon??'📌'}</div>
          <span class="sched-label">${c?.label??s.categoryId}</span>
          <span class="sched-pts">+${c?entryCost({categoryId:s.categoryId,intensity:s.intensity||'normal'}):'-'}</span>
          <button class="sched-del" onclick="delScheduled('${s.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>`;

  // Modo rápido — top 3 categorias mais usadas (só no dia atual)
  const quickCats=isToday?topCategories(3):[];
  const quickSection=quickCats.length<2?'': `
    <div style="padding:0 16px 8px">
      <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;margin-bottom:8px">REGISTRO RÁPIDO</div>
      <div style="display:flex;gap:8px">
        ${quickCats.map(c=>`
          <button onclick="quickRegister('${c.id}')" style="flex:1;padding:10px 6px;border-radius:12px;border:1px solid ${TYPE_BG[c.type]};background:${TYPE_BG[c.type]};cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px">
            <span style="font-size:20px">${c.icon}</span>
            <span style="font-size:10px;font-weight:600;color:var(--text);line-height:1.2;text-align:center">${c.label}</span>
          </button>`).join('')}
      </div>
    </div>`;

  // Modo dia difícil
  const hard=isToday&&isHardDay(todayStr());
  const hardBanner=hard?`<div style="margin:0 0 8px;padding:12px 14px;border-radius:12px;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);font-size:13px;color:var(--accent-lt);line-height:1.5">
    🌙 <b>Modo dia difícil ativo</b> — hoje você começa com <b>${effectiveDailyPts(todayStr())} colheres</b> (metade do normal). As atividades custam o mesmo — você simplesmente tem menos reserva hoje. Cuide-se.
  </div>`:'';

  // Meta de recuperação
  const goal=db.settings.recoveryGoal||0;
  const recCount=isToday?todayEntries().filter(e=>cat(e.categoryId)?.type==='recuperacao').length:0;
  const recoveryBar=isToday&&goal>0?`<div style="display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
    <span style="font-size:13px">${recCount>=goal?'✅':'💚'}</span>
    <div style="flex:1">
      <div style="font-size:11px;color:var(--muted);margin-bottom:4px">Meta de recuperação — ${recCount}/${goal}</div>
      <div style="height:4px;border-radius:2px;background:var(--border)"><div style="height:4px;border-radius:2px;background:#34D399;width:${Math.min(100,recCount/goal*100)}%;transition:width .3s"></div></div>
    </div>
    ${recCount>=goal?`<span style="font-size:11px;color:#34D399;font-weight:700">Atingida!</span>`:''}
  </div>`:'';

  // Frase pessoal
  const affirmation=db.settings.affirmation?`<div style="font-size:12px;color:var(--muted);font-style:italic;margin-top:4px;line-height:1.4">"${db.settings.affirmation}"</div>`:'';

  // Sintomas do dia (card na home)
  const todaySinReg=(db.sintomas?.registros||[]).filter(r=>r.date===viewDate);
  const sintomaHomeCard=(()=>{
    if(todaySinReg.length===0)return'';
    const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;
    const bycat={};
    todaySinReg.forEach(r=>{
      const s=lista.find(x=>x.id===r.sintomaId);if(!s)return;
      const gc=SINTOMAS_CATS.find(c=>c.id===s.cat);if(!gc)return;
      if(!bycat[s.cat])bycat[s.cat]={gc,items:[]};
      bycat[s.cat].items.push({s,r});
    });
    if(!Object.keys(bycat).length)return'';
    const catHTML=Object.values(bycat).map(({gc,items})=>`
      <div style="margin-bottom:10px">
        <div style="font-size:10px;font-weight:700;color:${gc.color};letter-spacing:.5px;margin-bottom:6px">${gc.label.toUpperCase()}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${items.map(({s,r})=>`
            <div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:${gc.colorBg};border:1px solid ${gc.color}40">
              <span style="font-size:13px">${s.icon}</span>
              <span style="font-size:12px;color:var(--text)">${s.label}</span>
              <span style="font-size:10px;color:${gc.color};font-weight:700">${'●'.repeat(r.intensidade)}</span>
            </div>`).join('')}
        </div>
      </div>`).join('');
    return`<div class="card" onclick="go('sintomas')" style="cursor:pointer">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="sec" style="margin:0">Sintomas de hoje</div>
        <span style="font-size:12px;color:var(--muted)">Ver tudo →</span>
      </div>
      ${catHTML}
    </div>`;
  })();

  // Modo dia difícil automático
  const autoHardDaySuggestion=isToday&&!hard&&rem<dailyPts*0.4&&todaySinReg.length>=3
    ?`<div style="margin:0 0 8px;padding:12px 14px;border-radius:12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);font-size:13px;color:var(--text2);line-height:1.5">
        💡 <strong style="color:#FCD34D">Dia pesado?</strong> Você tem energia baixa e ${todaySinReg.length} sintomas registrados hoje. Ativar o modo dia difícil reduz sua cota pela metade para refletir melhor o que você tem disponível.
        <button onclick="toggleHardDay()" style="display:block;margin-top:10px;width:100%;padding:8px;border-radius:8px;border:1px solid rgba(245,158,11,.4);background:rgba(245,158,11,.12);color:#FCD34D;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">🌙 Ativar modo dia difícil</button>
      </div>`:'';

  // Botão modo dia difícil (só hoje)
  const hardBtn=isToday?`<button onclick="toggleHardDay()" style="margin-top:10px;width:100%;padding:9px 12px;border-radius:10px;border:1px solid ${hard?'rgba(139,92,246,.5)':'var(--border)'};background:${hard?'rgba(139,92,246,.15)':'transparent'};color:${hard?'var(--accent-lt)':'var(--muted)'};cursor:pointer;font-family:inherit;text-align:left;display:flex;flex-direction:column;gap:2px">
    <span style="font-size:12px;font-weight:600">${hard?'✕ Desativar modo dia difícil':`🌙 Acordei já ${g('desgastada','desgastado','desgastadu')} — dia difícil`}</span>
    ${hard?'':`<span style="font-size:10px;color:var(--muted);opacity:.8">noite mal dormida, ansiedade alta ou corpo pesado desde cedo</span>`}
  </button>`:'';

  return `
    ${backupBanner}
    ${dateNav}
    <div class="card" id="tour-energy">
      <div class="nrg">
        ${nameGreet}
        ${affirmation}
        <div class="nrg-date">${fmtDate(viewDate)}</div>
        <div class="nrg-row">
          <div class="nrg-val ${rem<=0?'pulse':''}" style="color:${col}">${remRound}</div>
          <span class="nrg-spoon">🥄</span>
          <div class="nrg-total" style="color:var(--muted)">${dailyPts}</div>
        </div>
        <div class="nrg-label">Restante · Total <button class="info-btn" onclick="openHelp('colheres')">ⓘ</button></div>
        <div class="nrg-bar"><div class="nrg-fill" style="width:${p}%;background:${col}"></div></div>
        <div class="nrg-pct">${pct}% de energia restante</div>
        <div class="spoon-bar">${spoons}</div>
        ${(()=>{const s=calcStreak();return s>=2?`<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:6px">🔥 <strong style="color:var(--accent-lt)">${s} dias</strong> seguidos de check-in</div>`:''})()}
        ${recoveryBar}
        ${hardBtn}
      </div>
    </div>
    ${hard?hardBanner:''}
    ${autoHardDaySuggestion}
    ${alert}
    ${quickSection}
    ${schedSection}
    <div class="card">
      <div class="sec">Check-ins ${isToday?'de hoje':fmtDate(viewDate)} <button class="info-btn" onclick="openHelp('checkin')">ⓘ</button></div>
      <div class="period-row" id="tour-checkin">${periodCards}</div>
    </div>
    ${sintomaHomeCard}
    <div class="card">
      <div class="sec">Registros ${isToday?'de hoje':fmtDate(viewDate)} <button class="info-btn" onclick="openHelp('home')">ⓘ</button></div>
      ${entries}
    </div>`;
}

function sintomaEvolSheetHTML(){
  if(!sintomaEvolSheet)return'';
  const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;
  const s=lista.find(x=>x.id===sintomaEvolSheet.sintomaId);if(!s)return'';
  const gc=SINTOMAS_CATS.find(c=>c.id===s.cat);
  const days=[],vals=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);days.push(d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'}));const r=(db.sintomas?.registros||[]).find(r=>r.date===ds&&r.sintomaId===s.id);vals.push(r?.intensidade||0);}

    <div class="sheet">

            <div style="display:flex;justify-content:space-between;margin-top:8px">
              <span style="font-size:10px;color:var(--muted)">30 dias atrás</span>
              <span style="font-size:10px;color:var(--muted)">hoje</span>
            </div>`
          :`<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px">Nenhum registro nos últimos 30 dias</div>`}
        <button class="btn btn-sec" onclick="closeSintomaEvol()" style="margin-top:16px">Fechar</button>
      </div>
    </div>
  </div>`;
}

function initEvolChart(){
  if(!sintomaEvolSheet||typeof Chart==='undefined')return;
  const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;
  const s=lista.find(x=>x.id===sintomaEvolSheet.sintomaId);if(!s)return;
  const gc=SINTOMAS_CATS.find(c=>c.id===s.cat);
  const days=[],vals=[];
  for(let i=29;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);days.push(d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'}));const r=(db.sintomas?.registros||[]).find(r=>r.date===ds&&r.sintomaId===s.id);vals.push(r?.intensidade||0);}
  if(!vals.some(v=>v>0))return;
  requestAnimationFrame(()=>{
    const cv=document.getElementById('evolC');if(!cv)return;
    new Chart(cv,{type:'line',data:{labels:days,datasets:[{data:vals,borderColor:gc.color,backgroundColor:gc.color+'22',tension:.35,pointRadius:vals.map(v=>v>0?4:0),pointBackgroundColor:gc.color,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:3,ticks:{stepSize:1,color:CD.tickColor,font:{size:10},callback:v=>v===0?'—':v===1?'Leve':v===2?'Médio':'Forte'},grid:{color:CD.gridColor}},x:{ticks:{color:CD.tickColor,font:{size:9},maxTicksLimit:6,maxRotation:0},grid:{display:false}}}}});
  });
}

function toggleSintoma(sintomaId, intensidade){
  if(!db.sintomas)db.sintomas={lista:[...SINTOMAS_DEFAULT],registros:[]};
  if(!db.sintomas.registros)db.sintomas.registros=[];
  const today=todayStr();
  const idx=db.sintomas.registros.findIndex(r=>r.date===today&&r.sintomaId===sintomaId);
  if(idx>=0){
    if(db.sintomas.registros[idx].intensidade===intensidade) db.sintomas.registros.splice(idx,1);
    else{ db.sintomas.registros[idx].intensidade=intensidade; }
  } else {
    db.sintomas.registros.push({id:uid(),date:today,createdAt:new Date().toISOString(),sintomaId,intensidade});
    const s=(db.sintomas.lista||SINTOMAS_DEFAULT).find(x=>x.id===sintomaId);
    trackEvent('sintoma_registrado',{sintomaId,cat:s?.cat||'unknown',intensidade});
  }
  save();
  document.getElementById('main').innerHTML=renderSintomas();
}

function renderSintomas(){
  const today=todayStr();
  const todaySin=(db.sintomas?.registros||[]).filter(r=>r.date===today);
  const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;

  // histórico seguindo mapaRange (máx 14 dias na aba — acima disso fica pequeno demais)
  const histDays=Math.min(mapaRange,14);
  const last7=[];
  for(let i=histDays-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last7.push(d.toISOString().slice(0,10));}

  // frequência dos últimos 30 dias para ordenar
  const freqCutoff=new Date();freqCutoff.setDate(freqCutoff.getDate()-30);
  const freqById={};
  (db.sintomas?.registros||[]).filter(r=>new Date(r.date)>=freqCutoff).forEach(r=>{freqById[r.sintomaId]=(freqById[r.sintomaId]||0)+1;});

  const groupsHTML=SINTOMAS_CATS.map(gc=>{
    const items=lista.filter(s=>s.cat===gc.id)
      .sort((a,b)=>(freqById[b.id]||0)-(freqById[a.id]||0));
    const itemsHTML=items.map(s=>{
      const reg=todaySin.find(r=>r.sintomaId===s.id);
      const curInt=reg?.intensidade||0;

      const histHTML=last7.map(d=>{
        const r=(db.sintomas?.registros||[]).find(r=>r.date===d&&r.sintomaId===s.id);

        const op=r.intensidade===3?1:r.intensidade===2?.7:.45;
        return`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${gc.color};opacity:${op};flex-shrink:0"></div>`;

        <div onclick="openSintomaEvol('${s.id}')" style="font-size:20px;width:26px;text-align:center;flex-shrink:0;cursor:pointer">${s.icon}</div>

function buildInsights(){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-30);
  const recent=db.entries.filter(e=>new Date(e.date)>=cutoff&&e.categoryId!=='_custom_trigger');
  if(recent.length<5)return[];
  const insights=[];

  // Maior dreno
  const counts={};
  recent.filter(e=>cat(e.categoryId)?.type!=='recuperacao').forEach(e=>{counts[e.categoryId]=(counts[e.categoryId]||0)+1;});
  const topDrain=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  if(topDrain){const c=cat(topDrain[0]);if(c)insights.push(`${c.icon} <b>${c.label}</b> é seu maior dreno — apareceu <b>${topDrain[1]}x</b> nos últimos 30 dias.`);}

  // Taxa de recuperação
  const total=recent.length;
  const recoveries=recent.filter(e=>cat(e.categoryId)?.type==='recuperacao').length;
  const recPct=Math.round(recoveries/total*100);
  if(recPct<20)insights.push(`💡 Só <b>${recPct}%</b> dos seus registros são recuperações. Tente equilibrar mais.`);
  else if(recPct>=30)insights.push(`✨ <b>${recPct}%</b> dos registros são recuperações — você está cuidando bem de si.`);

  // Energia média nos checkins (últimos 7 dias)
  const d7=new Date();d7.setDate(d7.getDate()-7);
  const recentCi=db.checkins.filter(c=>new Date(c.date)>=d7);
  if(recentCi.length>=3){
    const avg=(recentCi.reduce((s,c)=>s+c.energy,0)/recentCi.length).toFixed(1);
    const label=avg>=7?'boa semana 💚':avg>=4?'semana moderada 🟡':'semana pesada 🔴';
    insights.push(`Sua energia média nos últimos 7 dias foi <b>${avg}/10</b> — ${label}.`);
  }

  // Dia com mais drenos
  const byDay={};
  recent.filter(e=>cat(e.categoryId)?.type!=='recuperacao').forEach(e=>{byDay[e.date]=(byDay[e.date]||0)+1;});
  const days=Object.entries(byDay).sort((a,b)=>b[1]-a[1]);
  if(days.length>=3){
    const dow=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const worstDayOfWeek={};
    days.forEach(([d,n])=>{const dw=dow[new Date(d+'T12:00').getDay()];worstDayOfWeek[dw]=(worstDayOfWeek[dw]||0)+n;});
    const worstDow=Object.entries(worstDayOfWeek).sort((a,b)=>b[1]-a[1])[0];
    if(worstDow)insights.push(`📅 <b>${worstDow[0]}</b> costuma ser seu dia mais pesado — considere proteger essa energia.`);
  }

  // Correlação sintomas cognitivos × alta carga energética
  const d7sin=new Date();d7sin.setDate(d7sin.getDate()-7);
  const recentSin=(db.sintomas?.registros||[]).filter(r=>new Date(r.date)>=d7sin);
  if(recentSin.length>=2){
    const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;
    const cogDates=new Set(recentSin.filter(r=>lista.find(x=>x.id===r.sintomaId)?.cat==='cognitivo').map(r=>r.date));
    if(cogDates.size>=2){
      const ep=db.settings.dailyPts;
      const heavyDates=new Set([...cogDates].filter(d=>{const du=db.entries.filter(e=>e.date===d&&cat(e.categoryId)?.type!=='recuperacao').reduce((s,e)=>s+Math.abs(entryCost(e)),0);return du/ep>0.6;}));
      const overlap=[...cogDates].filter(d=>heavyDates.has(d)).length;
      if(overlap>=2)insights.push(`🩺 Névoa mental e alta carga energética coincidiram <b>${overlap}×</b> nessa semana — pode ser sinal de sobrecarga acumulando.`);
    }
  }

  return insights;
}

function heatmapHTML(){
  const DAYS=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const PERIOD_IDS=['manha','tarde','noite'];
  const PERIOD_LABELS=['🌅 Manhã','☀️ Tarde','🌙 Noite'];
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-mapaRange);
  const recentCi=db.checkins.filter(c=>new Date(c.date)>=cutoff);

  // Build grid: period × weekday → avg energy
  const grid={};
  PERIOD_IDS.forEach(p=>{
    grid[p]={};
    DAYS.forEach((_,d)=>grid[p][d]={sum:0,count:0});
  });
  recentCi.forEach(c=>{
    const dow=(new Date(c.date+'T12:00:00').getDay()+6)%7; // Mon=0
    if(grid[c.period]&&grid[c.period][dow]!==undefined){
      grid[c.period][dow].sum+=c.energy;
      grid[c.period][dow].count++;
    }
  });

  const headRow=`<div></div>${DAYS.map(d=>`<div class="hm-head">${d}</div>`).join('')}`;
  const rows=PERIOD_IDS.map((p,pi)=>{
    const cells=DAYS.map((_,d)=>{
      const {sum,count}=grid[p][d];
      if(count===0)return`<div class="hm-cell" style="background:rgba(255,255,255,.05);color:var(--muted)">—</div>`;
      const avg=sum/count;
      const pct=avg/10;
      const r=Math.round(248*(1-pct));
      const g=Math.round(185*pct+113*(1-pct));
      const b=pct>0.6?129:pct>0.3?11:113;
      const bg=`rgba(${r},${g},${b},.3)`;
      const border=`rgba(${r},${g},${b},.6)`;
      return`<div class="hm-cell" style="background:${bg};border:1px solid ${border};color:#fff">${avg.toFixed(0)}</div>`;
    }).join('');
    return`<div class="hm-row-lbl">${PERIOD_LABELS[pi].split(' ')[0]}</div>${cells}`;
  }).join('');

  return`<div class="heatmap-wrap"><div class="heatmap-grid">${headRow}${rows}</div></div>
    <div style="display:flex;gap:10px;margin-top:10px;justify-content:center;font-size:11px;color:var(--muted)">
      <span>Número = energia média (0–10)</span>
    </div>`;
}

          </div>
          ${(()=>{
            const lista=db.sintomas?.lista||SINTOMAS_DEFAULT;

            const chips=top.map(s=>{

              <div style="font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.4px;margin-bottom:8px">SENTINDO ALGUM SINTOMA AGORA?</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div>
            </div>`;
          })()}
          <textarea class="note" rows="2" placeholder="Contexto rápido — o que está pesando ou te animando? (opcional)" oninput="checkinState.note=this.value" style="margin-top:12px">${checkinState.note||''}</textarea>
          <button class="btn btn-p" onclick="submitCheckin()" ${!checkinState.humor?'disabled':''}>

        </div>
      </div>
    </div>`;
}

  addScheduled(catId, time, intensity, note);
  closeSheet();
}

const charts={};

function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;charts[id]=new Chart(el,cfg);}

const CD={color:'#C4B8E8',gridColor:'rgba(255,255,255,.06)',tickColor:'#7C6FA0'};

function initCharts(){
  if(typeof Chart==='undefined')return;
  Chart.defaults.color=CD.color;
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-mapaRange);
  const recent=db.entries.filter(e=>new Date(e.date)>=cutoff&&e.categoryId!=='_custom_trigger');
  if(recent.length<5)return;

  const byId={};

  const days=[],used=[];

  mkChart('weekC',{type:'bar',data:{labels:days,datasets:[{data:used,backgroundColor:used.map(v=>{const p=(v/db.settings.dailyPts)*100;return p>70?'rgba(248,113,113,.7)':p>40?'rgba(252,211,77,.7)':'rgba(52,211,153,.7)';}),borderRadius:7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,max:db.settings.dailyPts,grid:{color:CD.gridColor},ticks:{color:CD.tickColor,font:{size:11}}},x:{grid:{display:false},ticks:{color:CD.tickColor,font:{size:11}}}}}});

  // Gráfico Sintomas × Energia
  const sinDays=[],sinEn=[],sinSin=[];

  const maxSin=Math.max(...sinSin,3);
  mkChart('sintomasC',{type:'line',data:{labels:sinDays,datasets:[{label:'Energia gasta',data:sinEn,borderColor:'#8B5CF6',backgroundColor:'rgba(139,92,246,.1)',tension:.35,pointRadius:4,pointBackgroundColor:'#8B5CF6',yAxisID:'y',fill:true},{label:'Carga sintomas',data:sinSin,borderColor:'#F87171',backgroundColor:'rgba(248,113,113,.08)',tension:.35,pointRadius:4,pointBackgroundColor:'#F87171',yAxisID:'y2',fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8,color:CD.color}}},scales:{y:{beginAtZero:true,max:db.settings.dailyPts,grid:{color:CD.gridColor},ticks:{color:CD.tickColor,font:{size:10}},position:'left',title:{display:true,text:'pts',color:CD.tickColor,font:{size:9}}},y2:{beginAtZero:true,max:maxSin*1.3,grid:{display:false},ticks:{color:'#F87171',font:{size:10}},position:'right',title:{display:true,text:'sint.',color:'#F87171',font:{size:9}}}}}});

  const ciCutoff=new Date();ciCutoff.setDate(ciCutoff.getDate()-mapaRange);
  const recentCi=db.checkins.filter(c=>new Date(c.date)>=ciCutoff);
  if(recentCi.length>0){
    const pLabels=Object.values(PERIODS).map(p=>`${p.icon} ${p.label}`);
    const hColors=['#86EFAC','#93C5FD','#FCA5A5','#C4B5FD','#6EE7B7','#FDE68A'];
    const datasets=HUMORS.map((h,i)=>({
      label:`${h.icon} ${humorLabel(h)}`,

  }
