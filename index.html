    3:{num:'2 de 5', title:'Registrar ➕', text:'Aqui você marca o que drenou ou recarregou: reunião, barulho, descanso, música... Toque em uma categoria pra experimentar.', cta:'Próximo →'},
    4:{num:'3 de 5', title:'Sintomas 🩺', text:'Registre sintomas físicos e emocionais separados do gasto de energia — dor, ansiedade, sobrecarga sensorial. Cada corpo é único.', cta:'Próximo →'},
    5:{num:'4 de 5', title:'Mapa de padrões 📊', text:'Com o tempo você verá quais atividades mais drenam, qual período pesa mais e suas tendências emocionais. Quanto mais registrar, mais claro fica.', cta:'Próximo →'},
    6:{num:'5 de 5', title:'SOS 🆘', text:'Para momentos de sobrecarga: respiração guiada, ancoragem nos sentidos e o CVV (188). Sempre aqui quando precisar.', cta:'Próximo →'},
  };
  const s=guideSteps[tourStep];
  if(!s) return '';
  const dots=[2,3,4,5,6].map(i=>`<span style="width:6px;height:6px;border-radius:50%;background:${i===tourStep?'var(--accent)':'rgba(255,255,255,.2)'};display:inline-block;transition:background .2s"></span>`).join('');
  const ctaOnclick=s.action==='checkin'?'openCheckin()':'tourNext()';
  return `
    <div style="position:fixed;bottom:72px;left:0;right:0;z-index:2000;padding:0 12px 6px">
      <div style="background:var(--card);border:1.5px solid rgba(167,139,250,.45);border-radius:20px;padding:16px 18px 14px;box-shadow:0 -2px 28px rgba(0,0,0,.55)">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:11px;font-weight:700;color:var(--accent-lt);letter-spacing:.5px;text-transform:uppercase">Passo ${s.num}</span>
          <div style="display:flex;gap:5px">${dots}</div>
        </div>
        <div style="font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px">${s.title}</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:14px">${s.text}</div>
        <div style="display:flex;gap:8px;align-items:center">
          ${tourStep>2?`<button onclick="tourPrev()" style="background:none;border:1.5px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;padding:10px 12px;border-radius:12px;font-family:inherit;white-space:nowrap">← Voltar</button>`:''}
          <button onclick="${ctaOnclick}" style="flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">${s.cta}</button>
          <button onclick="tourNext()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0 4px;font-family:inherit;white-space:nowrap">Pular</button>
        </div>
      </div>
    </div>`;
}

function renderTourGuide(){
  const el=document.getElementById('tour-guide');
  if(!el) return;
  // Hide guide bar when any modal/sheet is open
  const modalOpen=!!(checkinState||sheetState||helpSheet||showFeedback||onboardingStep>0);
  const active=tourStep>=2&&tourStep<=6&&!modalOpen;
  el.innerHTML=active?tourGuideBarHTML():'';
  const main=document.getElementById('main');
  if(main) main.style.paddingBottom=active?'210px':'';
}

function tourPrev(){
  if(tourStep>2){
    tourStep--;
    const tab=TOUR_TABS[tourStep];
    if(tab&&tab!==screen) go(tab);
    else { renderOverlays(); renderTourGuide(); }
  }
}
function tourNext(){
  if(tourStep<7){
    tourStep++;
    const tab=TOUR_TABS[tourStep];
    if(tab&&tab!==screen) go(tab);
    else { renderOverlays(); renderTourGuide(); }
  } else {
    tourStep=0; localStorage.setItem(TOUR_KEY,'1');
    renderOverlays(); renderTourGuide();
    if(shouldShowCheckin()) setTimeout(openCheckin,400);
  }
}

function renderOverlays(){
  const el=document.getElementById('overlays');if(!el)return;
  if(onboardingStep>0)              el.innerHTML=onboardingHTML();
  else if(tourStep===1||tourStep===7) el.innerHTML=tourOverlayHTML();
  else if(catInfoId)       el.innerHTML=catInfoHTML();
  else if(helpSheet)       el.innerHTML=helpSheetHTML();
  else if(showPrivacy)     el.innerHTML=privacyHTML();
  else if(showFeedback)    el.innerHTML=feedbackHTML();
  else if(checkinState)    el.innerHTML=checkinOverlayHTML();
  else if(triggerSheetState) el.innerHTML=triggerSheetHTML();
  else if(sheetState)      el.innerHTML=categorySheetHTML();
  else if(showReport)      el.innerHTML=reportSheetHTML();
  else if(addSintomaSheet)  el.innerHTML=addSintomaSheetHTML();
  else if(sintomaEvolSheet){el.innerHTML=sintomaEvolSheetHTML();initEvolChart();}
  else el.innerHTML='';
  renderTourGuide();
}

function render(){
  killCharts();
  document.getElementById('app').innerHTML=`
    <div class="hdr">
      <span class="hdr-title">${TITLES[screen]}</span>
      <div style="display:flex;align-items:center;gap:8px"><span class="beta-badge">beta</span><img src="icon.png" class="hdr-icon" style="width:28px;height:28px;border-radius:7px;object-fit:cover"></div>
    </div>
    <div id="update-banner" class="update-banner" style="display:none;margin:12px 16px 0;flex-direction:column;gap:10px;align-items:stretch">
      <div class="update-banner-txt">
        <strong>✨ Versão 2.3.0 disponível!</strong>
        Tour guiado com botão Voltar, nav com destaque claro, botão do onboarding com leitura obrigatória e sobreposições corrigidas. Faça backup antes de atualizar.
      </div>
      <div style="display:flex;gap:8px">
        <button class="update-banner-btn" style="flex:1;background:rgba(255,255,255,.1);color:var(--text);border:1px solid rgba(255,255,255,.15)" onclick="go('settings')">📦 Fazer backup</button>
        <button class="update-banner-btn" style="flex:1" onclick="dismissUpdate();setTimeout(()=>location.reload(),400)">Atualizar agora</button>
      </div>
    </div>
    <div class="main" id="main">${CONTENT[screen]()}</div>
    <nav class="bnav">
      ${(()=>{const v=getVisitedTabs();return NAV.map(n=>`<button id="nav-${n.id}" class="nav-btn ${n.cls} ${screen===n.id?'on':''}" onclick="go('${n.id}')"><span class="nav-ico" style="position:relative">${n.icon}${n.id==='settings'?`<span class="nav-config-badge" style="display:${needsBackupReminder()?'block':'none'}"></span>`:!v[n.id]?'<span class="nav-new-badge"></span>':''}</span><span>${n.label}</span></button>`).join('');})()}
    </nav>`;
  renderOverlays();
  renderTourGuide();
  if(screen==='mapa')requestAnimationFrame(initCharts);
  if(screen==='sos')requestAnimationFrame(()=>{if(groundingStep>=0)renderGrounding();});
}

// ── VERSÃO / ATUALIZAÇÃO ─────────────────────────────────────────────────────
const APP_VERSION = '2.3.0';
const VERSION_KEY = 'recarregue_version';

function checkAppUpdate(){
  const stored = localStorage.getItem(VERSION_KEY);
  if(!stored){
    // primeira vez — só salva
    localStorage.setItem(VERSION_KEY, APP_VERSION);
    return;
  }
  if(stored !== APP_VERSION){
    // nova versão detectada — mostra banner
    localStorage.setItem(VERSION_KEY, APP_VERSION);
    setTimeout(()=>{
      const banner = document.getElementById('update-banner');
      if(banner) banner.style.display='flex';
    }, 1000);
  }
}

function dismissUpdate(){
  const banner = document.getElementById('update-banner');
  if(banner) banner.style.display='none';
}

// ── BOOT ──────────────────────────────────────────────────────────────────────

// Preview mode: ?preview=1 reseta só o estado de UI (onboarding/versão) sem apagar dados
// Nenhum trackEvent é disparado durante preview para não contaminar analytics
let PREVIEW_MODE = false;
if(new URLSearchParams(location.search).get('preview')==='1'){
  PREVIEW_MODE = true;
  localStorage.removeItem('recarregue_v1_onboarded');
  localStorage.removeItem('recarregue_version');
  localStorage.removeItem('recarregue_visited_tabs');
  history.replaceState(null,'',location.pathname);
}

load();applyTheme();
// Inicia tour se onboarding já foi feito mas tour não, e usuário ainda não tem dados (novo usuário real)
if(localStorage.getItem(ONBOARDED_KEY)&&!localStorage.getItem(TOUR_KEY)&&db.checkins.length===0) tourStep=1;
render();
if(onboardingStep>0) scheduleOnboardRead();
// Sessão: só conta 1 por hora por dispositivo
const _lastSession = parseInt(localStorage.getItem('recarregue_last_session')||'0');
if(Date.now() - _lastSession > 3600000){
  localStorage.setItem('recarregue_last_session', Date.now());
  trackEvent('session_started',{
    returning: !!localStorage.getItem(ONBOARDED_KEY),
    tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
    lang: navigator.language,
    screen: `${screen.width}x${screen.height}`,
    platform: navigator.platform || navigator.userAgentData?.platform || 'unknown',
  });
}
if(onboardingStep===0&&!tourStep&&shouldShowCheckin())setTimeout(openCheckin,700);
if(db.settings.notifEnabled)scheduleNotifs();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));

// Aplica agendamentos que já passaram do horário
applyDueScheduled();
// Verifica a cada 2 min se algum agendamento venceu
setInterval(applyDueScheduled, 120_000);

// Verifica atualização disponível
checkAppUpdate();
</script>
</body>
